name: Build & Push RunPod Worker

on:
  push:
    branches: [main]
    paths:
      - "runpod-worker/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./runpod-worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ltx-video-worker:latest
